- name: copy the {{ component }} repo
  ansible.builtin.copy:
    src: rabbitmq.repo
    dest: /etc/yum.repos.d/rabbitmq.repo

- name: install {{ component }}
  ansible.builtin.dnf:
    name: rabbitmq-server
    state: present

- name: start and enable {{ component }}
  tags:
  - deployment
  ansible.builtin.service:
    name: rabbitmq-server
    state: restarted
    enabled: yes

- name: install botocore and boto3
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - boto3
  - botocore
  #- pika

- name: create {{ component }} user
  community.rabbitmq.rabbitmq_user:
    user: roboshop 
    password: "{{ RABBITMQ_PASSWORD }}"
    permissions:
      - vhost: /
        configure_priv: .*
        read_priv: .*
        write_priv: .*
    state: present